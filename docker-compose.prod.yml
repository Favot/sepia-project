services:
  frontend:
    build:
      context: .
      dockerfile: web-app/Dockerfile
    expose:
      - "3000"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    expose:
      - "3000"
    restart: unless-stopped