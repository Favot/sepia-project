services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: web-app/Dockerfile
    expose:
      - "3000"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    expose:
      - "3000"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
